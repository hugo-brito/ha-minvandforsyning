name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          # Extract major.minor from manifest (first two segments)
          MAJOR_MINOR=$(jq -r '.version' custom_components/minvandforsyning/manifest.json | grep -oP '^\d+\.\d+')

          # Build number: YYDDD (2-digit year + 3-digit day of year)
          BUILD=$(date -u +"%y%j")

          # Revision: count existing tags with same major.minor.build prefix + 1
          PREFIX="v${MAJOR_MINOR}.${BUILD}."
          REVISION=$(git tag -l "${PREFIX}*" | wc -l)
          REVISION=$((REVISION + 1))

          VERSION="${MAJOR_MINOR}.${BUILD}.${REVISION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Update manifest version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            custom_components/minvandforsyning/manifest.json > tmp.json
          mv tmp.json custom_components/minvandforsyning/manifest.json

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/minvandforsyning/manifest.json
          git commit -m "Bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
